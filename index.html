<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Subash Sharma | Materials Scientist</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --accent: #e67e22;
            --text: #333;
            --bg: #f4f6f7;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: var(--text); 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        /* --- HEADER LAYOUT FOR PHOTO --- */
        .header-container {
            display: flex;
            align-items: center;
            gap: 35px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .profile-pic {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--secondary);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .header-text h1 { 
            color: var(--primary); 
            margin: 0 0 5px 0; 
            font-size: 2.8em; 
            border-bottom: none;
        }
        .header-text .title {
            font-size: 1.3em;
            color: var(--secondary);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .contact { 
            color: #7f8c8d; 
            font-size: 1.05em; 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center;
            gap: 12px; 
        }
        .contact a { color: var(--secondary); text-decoration: none; font-weight: bold; }
        .contact a:hover { text-decoration: underline; }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .header-container { flex-direction: column; text-align: center; }
            .contact { justify-content: center; }
        }

        /* Rest of the styling */
        h2 { color: var(--secondary); margin-top: 35px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .job-title { font-weight: bold; font-size: 1.15em; color: var(--primary); }
        .institution { color: var(--accent); font-weight: bold; }
        .date { color: #95a5a6; font-size: 0.9em; font-style: italic; }
        .experience-item, .education-item { margin-bottom: 25px; }
        ul { margin-top: 10px; padding-left: 20px; }
        li { margin-bottom: 8px; }
        .intro-text { font-size: 1.1em; color: var(--primary); }
        
        /* Details and Summary styling */
        details {
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid #e1e8ed; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        details:hover {
            border-color: var(--secondary);
        }
        summary {
            font-weight: bold; 
            color: var(--secondary); 
            font-size: 1.1em;
            outline: none;
        }
        details > div {
            margin-top: 15px; 
            color: #444; 
            line-height: 1.6; 
            cursor: default;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </details>
    </style>
</head>
